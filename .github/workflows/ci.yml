name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache build dir
        uses: actions/cache@v4
        with:
          path: build_out
          key: ${{ runner.os }}-build-out-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        env:
          CARGO_TARGET_DIR: build_out
        run: cargo test --workspace

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CARGO_TARGET_DIR: build_out
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binaries
        run: |
          set -e
          cargo build --release -p uefn_scan_cli -p mcp_server

      - name: List outputs (Unix)
        if: runner.os != 'Windows'
        run: |
          ls -lah build_out/release || true
          file build_out/release/* || true

      - name: Upload artifacts (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: verse-mcp-${{ runner.os }}
          path: |
            build_out/release/uefn_scan_cli
            build_out/release/mcp_server
          if-no-files-found: error
          retention-days: 7

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: verse-mcp-${{ runner.os }}
          path: |
            build_out/release/uefn_scan_cli.exe
            build_out/release/mcp_server.exe
          if-no-files-found: error
          retention-days: 7
