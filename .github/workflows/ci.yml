name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache build dir
        uses: actions/cache@v4
        with:
          path: build_out
          key: ${{ runner.os }}-build-out-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        env:
          CARGO_TARGET_DIR: build_out
        run: cargo test --workspace

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CARGO_TARGET_DIR: build_out
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --workspace

      - name: Prepare dist (Unix)
        if: runner.os != 'Windows'
        run: |
          set -e
          mkdir -p dist
          # copy binaries if present
          [ -f build_out/release/uefn_scan_cli ] && cp build_out/release/uefn_scan_cli dist/uefn_scan_cli-${{ matrix.os }} || true
          [ -f build_out/release/mcp_server ] && cp build_out/release/mcp_server dist/mcp_server-${{ matrix.os }} || true
          # create checksums
          if [ "$(ls -A dist 2>/dev/null)" ]; then sha256sum dist/* > dist/SHA256SUMS; fi

      - name: Prepare dist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          if (Test-Path build_out/release/uefn_scan_cli.exe) { Copy-Item build_out/release/uefn_scan_cli.exe dist/uefn_scan_cli-windows.exe }
          if (Test-Path build_out/release/mcp_server.exe) { Copy-Item build_out/release/mcp_server.exe dist/mcp_server-windows.exe }
          if (Get-ChildItem dist | Measure-Object | Select-Object -ExpandProperty Count) {
            Get-ChildItem dist | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
              $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
              "$h  $($_.Name)" | Out-File -FilePath dist/SHA256SUMS -Append -Encoding ascii
            }
          }

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: dist/*
          if-no-files-found: warn
          retention-days: 7
