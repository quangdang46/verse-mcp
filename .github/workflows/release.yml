name: Release

on:
  push:
    tags:
      - 'uefn_scan_cli-v*'
      - 'mcp_server-v*'
      - 'release-all-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Select crates
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.select.outputs.crates }}
    steps:
      - id: select
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            uefn_scan_cli-v*) echo 'crates=["uefn_scan_cli"]' >> "$GITHUB_OUTPUT" ;;
            mcp_server-v*) echo 'crates=["mcp_server"]' >> "$GITHUB_OUTPUT" ;;
            release-all-v*) echo 'crates=["uefn_scan_cli","mcp_server"]' >> "$GITHUB_OUTPUT" ;;
            *)
              echo "Unsupported tag: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

  build:
    name: Build ${{ matrix.suffix }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-x86_64
            archive_ext: tar.gz
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-aarch64
            archive_ext: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            suffix: macos-x86_64
            archive_ext: tar.gz
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: macos-aarch64
            archive_ext: tar.gz
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            suffix: windows-x86_64
            archive_ext: zip
            use_cross: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.use_cross
        shell: bash
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build selected crates on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          CRATES_JSON: ${{ needs.prepare.outputs.crates }}
        run: |
          mkdir -p dist
          for crate in $(echo "$CRATES_JSON" | jq -r '.[]'); do
            case "$crate" in
              uefn_scan_cli)
                bin="verse-scan"
                ;;
              mcp_server)
                bin="vm"
                ;;
              *)
                echo "Unsupported crate: $crate" >&2
                exit 1
                ;;
            esac

            if [ "${{ matrix.use_cross }}" = 'true' ]; then
              cross build --release -p "$crate" --target "${{ matrix.target }}"
            else
              cargo build --release -p "$crate" --target "${{ matrix.target }}"
            fi

            archive="${bin}-${{ matrix.suffix }}.${{ matrix.archive_ext }}"
            tar -C "target/${{ matrix.target }}/release" -czf "dist/${archive}" "$bin"
            shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"
          done
      - name: Build selected crates on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CRATES_JSON: ${{ needs.prepare.outputs.crates }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $crates = $env:CRATES_JSON | ConvertFrom-Json
          foreach ($crate in $crates) {
            switch ($crate) {
              'uefn_scan_cli' { $bin = 'verse-scan' }
              'mcp_server' { $bin = 'vm' }
              default {
                Write-Error "Unsupported crate: $crate"
                exit 1
              }
            }

            cargo build --release -p $crate --target "${{ matrix.target }}"

            $archive = "$bin-${{ matrix.suffix }}.${{ matrix.archive_ext }}"
            Compress-Archive -Path "target/${{ matrix.target }}/release/$bin.exe" -DestinationPath "dist/$archive" -Force
            $hash = (Get-FileHash "dist/$archive" -Algorithm SHA256).Hash.ToLower()
            Set-Content -Path "dist/$archive.sha256" -Value "$hash  $archive"
          }
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true


