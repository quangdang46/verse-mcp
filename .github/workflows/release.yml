name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-x86_64
            archive_ext: tar.gz
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-aarch64
            archive_ext: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            suffix: macos-x86_64
            archive_ext: tar.gz
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: macos-aarch64
            archive_ext: tar.gz
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            suffix: windows-x86_64
            archive_ext: zip
            use_cross: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.use_cross
        shell: bash
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build workspace binaries on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for spec in "uefn_scan_cli:verse-scan" "mcp_server:vm"; do
            crate="${spec%%:*}"
            bin="${spec##*:}"

            if [ "${{ matrix.use_cross }}" = 'true' ]; then
              cross build --release -p "$crate" --target "${{ matrix.target }}"
            else
              cargo build --release -p "$crate" --target "${{ matrix.target }}"
            fi

            archive="${bin}-${{ matrix.suffix }}.${{ matrix.archive_ext }}"
            tar -C "target/${{ matrix.target }}/release" -czf "dist/${archive}" "$bin"
            shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"
          done
      - name: Build workspace binaries on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $pairs = @(
            @{ crate = 'uefn_scan_cli'; bin = 'verse-scan' },
            @{ crate = 'mcp_server'; bin = 'vm' }
          )

          foreach ($pair in $pairs) {
            cargo build --release -p $pair.crate --target "${{ matrix.target }}"

            $archive = "$($pair.bin)-${{ matrix.suffix }}.${{ matrix.archive_ext }}"
            Compress-Archive -Path "target/${{ matrix.target }}/release/$($pair.bin).exe" -DestinationPath "dist/$archive" -Force
            $hash = (Get-FileHash "dist/$archive" -Algorithm SHA256).Hash.ToLower()
            Set-Content -Path "dist/$archive.sha256" -Value "$hash  $archive"
          }
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
